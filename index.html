<!DOCTYPE html>
<html lan="en">
    <head>
      <meta charset="UTF-8">
      <mata name="viewport" content="widht=device-width, initial-scale=1.0">
        <title>TaskZen</title>
        <link rel="stylesheet" href="style.css">
      </mata>  
    </head>
    <body>
        <header>
            <h1>TASKZEN</h1>
            <p>Manage your projects</p>
        </header>
        <div class="input-container">
            <input type="text" id="task-input" placeholder="Enter Your Task Here">
            <button id="add-task-btn" onclick="addTask()">ADD TASK</button>
            <button id="clear-done-btn" onclick="clearDoneTasks()">CLEAR DONE</button>
         </div>
         <div class="board">
            <div class="column" id="to-do-col">
                <h3>TO DO</h3>
                <div class="task-list" id="todo-list"></div>
            </div>
            <div class="column" id="in-progress-col">
                <h3>In progress</h3>
                <div class="task-list" id="in-progress-list"></div>
            </div>
            <div class="column" id="done-col">
                <h3>Done</h3>
                <div class="task-list" id="done-list">
                </div>
            </div>
         </div>
         <script src="script.js"></script>
    </body>
</html>
